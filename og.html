<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@600;700&family=Pacifico&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#f6ecd6;--ink:#23201c;--red:#e0452f;--red-d:#b8331f;--blue:#2f6fb0;
    --yellow:#f4c12e;--green:#3f9158;--paper:#fffaf0;--shadow:rgba(40,25,10,.32);
  }
  *{margin:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;overflow:hidden;}
  body{
    display:flex;align-items:center;gap:50px;padding:0 64px;
    font-family:"Oswald",sans-serif;
    background:radial-gradient(120% 130% at 28% 12%, #ffe39a 0%, var(--yellow) 32%, var(--red) 100%);
    position:relative;
  }
  .stars span{position:absolute;color:#fff;opacity:.55;font-size:20px;}
  /* ---- rookie card ---- */
  .card{width:392px;height:548px;flex:0 0 auto;border-radius:14px;overflow:hidden;border:6px solid #fff;
    box-shadow:0 26px 50px var(--shadow);transform:rotate(-4deg);display:flex;flex-direction:column;background:var(--yellow);}
  .cf-top{background:var(--blue);color:#fff;padding:12px 14px 14px;text-align:center;position:relative;}
  .cf-top .s{position:absolute;top:12px;font-size:15px;letter-spacing:8px;opacity:.9;}
  .cf-top .s.l{left:14px}.cf-top .s.r{right:14px}
  .cf-name{font-family:"Pacifico",cursive;font-size:2.6rem;line-height:1;margin-top:8px;text-shadow:2px 2px 0 rgba(0,0,0,.25);}
  .cf-photo{flex:1;overflow:hidden;background:#cfd6da;}
  .cf-photo img{width:100%;height:100%;object-fit:cover;}
  .cf-banner{background:var(--green);color:#fff;text-align:center;font-family:"Anton";letter-spacing:.14em;font-size:1.5rem;padding:13px 6px;}
  /* ---- right text ---- */
  .right{flex:1;color:#fff;}
  .kicker{font-family:"Oswald";font-weight:700;letter-spacing:.34em;font-size:1.05rem;opacity:.95;text-shadow:0 2px 3px rgba(0,0,0,.18);}
  .greet{font-family:"Pacifico",cursive;font-size:4.6rem;line-height:1.04;margin:14px 0 18px;
    text-shadow:3px 3px 0 var(--red-d),6px 6px 0 rgba(0,0,0,.18);}
  .sub{font-family:"Oswald";font-weight:600;font-size:1.5rem;letter-spacing:.02em;
    background:rgba(0,0,0,.22);display:inline-block;padding:10px 20px;border-radius:30px;}
  .pill{margin-top:22px;font-family:"Anton";letter-spacing:.12em;font-size:1.15rem;color:#fff;opacity:.92;}
</style>
</head>
<body>
  <div class="stars">
    <span style="left:6%;top:18%">✦</span><span style="left:46%;top:8%">✦</span>
    <span style="left:90%;top:26%">✦</span><span style="left:70%;top:80%">✦</span>
    <span style="left:33%;top:88%">✦</span><span style="left:96%;top:62%">✦</span>
  </div>

  <div class="card">
    <div class="cf-top"><span class="s l">★★</span><span class="s r">★★</span><div class="cf-name">Dr. Dan</div></div>
    <div class="cf-photo"><img src="images/hero-scuba.jpg" alt="" /></div>
    <div class="cf-banner">TEAM BESKIND</div>
  </div>

  <div class="right">
    <div class="kicker">A SPECIAL DELIVERY FOR</div>
    <div class="greet">Happy<br>Father's Day,<br>Dad</div>
    <div class="sub">Tap to open Dad's rookie card →</div>
    <div class="pill">★ MVP DAD &nbsp;·&nbsp; FIRST-BALLOT HALL OF FAME ★</div>
  </div>
</body>
</html>
